<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Security Authorization Portal</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #020617; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #0f172a; border: 1px solid #1e293b; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; }
        h2 { margin: 0 0 8px 0; color: #fff; font-size: 22px; }
        p { margin: 0 0 24px 0; color: #64748b; font-size: 14px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; font-weight: 600; }
        .input-control { width: 100%; background: #020617; border: 1px solid #334155; color: white; padding: 12px; border-radius: 6px; box-sizing: border-box; outline: none; }
        .input-control:focus { border-color: #2563eb; }
        .submit-btn { background: #2563eb; color: white; border: none; width: 100%; padding: 12px; border-radius: 6px; font-weight: 700; margin-top: 10px; cursor: pointer; transition: background 0.2s; }
        .submit-btn:hover { background: #1d4ed8; }
        .err-plate { background: rgba(239,68,68,0.1); border: 1px solid #ef4444; color: #ef4444; padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 20px; text-align: left; }
    </style>
</head>
<body>
<div class="login-card">
    <h2>System Terminal Authorization</h2>
    <p>Please log in with system administrator credentials.</p>
    
    {% if error %}
    <div class="err-plate">⚠️ {{ error }}</div>
    {% endif %}
    
    <form method="POST">
        <div class="form-group">
            <label>Operator Username</label>
            <input type="text" name="username" class="input-control" required placeholder="e.g. admin">
        </div>
        <div class="form-group">
            <label>Secure Security Passphrase</label>
            <input type="password" name="password" class="input-control" required placeholder="••••••••">
        </div>
        <button type="submit" class="submit-btn">PROCEED AUTHORIZATION</button>
    </form>
</div>
</body>
</html>
