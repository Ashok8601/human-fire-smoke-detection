<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Security - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #121212; color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #1e1e1e; border: 1px solid #ff4444; border-radius: 12px; padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 0 20px rgba(255, 68, 68, 0.2); }
        .form-control { background: #2a2a2a; color: #fff; border: 1px solid #444; }
        .form-control:focus { background: #333; color: #fff; border-color: #ff4444; box-shadow: none; }
        .btn-danger { background: #ff4444; border: none; }
        .btn-danger:hover { background: #cc3333; }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="text-center mb-4 text-danger">🛑 AI CAMERA CONTROL</h3>
        {% if error %}
            <div class="alert alert-danger text-center p-2">{{ error }}</div>
        {% endif %}
        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter Username" required autocomplete="off">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
            </div>
            <button type="submit" class="btn btn-danger w-100 mt-2 py-2 fw-bold">SECURE LOG IN</button>
        </form>
    </div>
</body>
</html>
