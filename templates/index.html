<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIA Body Shop - Live AI Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #09090b; 
            color: #f4f4f5; 
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
        }

        /* Full Screen Video Workspace */
        .video-workspace {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .feed-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Glassmorphism HUD Toolbar */
        .hud-header {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            height: 60px;
            background: rgba(18, 18, 22, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .brand-zone { display: flex; align-items: center; gap: 8px; max-width: 45%; }
        .brand-zone h2 { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .live-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            flex-shrink: 0;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Controls Panel Grid */
        .control-cluster { display: flex; align-items: center; gap: 8px; position: relative; }
        .btn-hud {
            background: rgba(255, 255, 255, 0.05);
            color: #f4f4f5;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }
        .btn-hud:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .btn-alert-active { background: rgba(239, 68, 68, 0.2); border-color: #ef4444; color: #f87171; }

        /* Navigation Configuration Dropdown Menu */
        .config-wrapper { position: relative; }
        .config-dropdown {
            display: none;
            position: absolute;
            top: 50px;
            right: 0;
            width: 240px;
            background: #18181b;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 6px;
            list-style: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            z-index: 20;
        }
        .config-dropdown.active { display: block; animation: fadeIn 0.15s ease-out; }
        .config-dropdown li a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            color: #a1a1aa;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        .config-dropdown li a:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }
        .config-dropdown .menu-divider { height: 1px; background: rgba(255, 255, 255, 0.06); margin: 6px 0; }
        .config-dropdown li a.logout-btn { color: #f87171; }
        .config-dropdown li a.logout-btn:hover { background: rgba(239, 68, 68, 0.1); }

        /* FLOATING BOTTOM OVERLAY DRAWER SYSTEM */
        .overlay-bottom-drawer {
            position: absolute;
            bottom: -290px; /* Hidden state at the bottom */
            left: 15px;
            right: 15px;
            height: 240px;
            background: rgba(18, 18, 22, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px 12px 0 0;
            padding: 12px 15px;
            z-index: 10;
            transition: cubic-bezier(0.16, 1, 0.3, 1) 0.4s;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
        }
        .overlay-bottom-drawer.open { bottom: 0; }
        
        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 6px;
        }
        .drawer-header h3 { font-size: 12px; text-transform: uppercase; color: #e4e4e7; letter-spacing: 0.5px; }
        
        /* Row-wise horizontal layout for snapshots */
        .snapshot-horizontal-box {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding-bottom: 6px;
            flex: 1;
            align-items: center;
            -webkit-overflow-scrolling: touch;
        }
        .snapshot-horizontal-box::-webkit-scrollbar { height: 4px; }
        .snapshot-horizontal-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
        
        .snap-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            padding: 6px;
            min-width: 140px;
            max-width: 140px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .snap-card:hover { border-color: #ef4444; transform: translateY(-2px); }
        .snap-card img { width: 100%; height: 85px; object-fit: cover; border-radius: 6px; margin-bottom: 4px; }
        .snap-info { display: flex; flex-direction: column; gap: 2px; font-size: 10px; }
        .snap-time { color: #a1a1aa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .snap-conf { color: #f59e0b; font-weight: 600; }

        /* Fixed Status Info Bar */
        .info-bar { display: flex; gap: 12px; font-size: 11px; color: #a1a1aa; }
        .info-bar span strong { color: #fff; }

        /* Full Scale Screen Pop-up Modal */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(4, 4, 5, 0.95); 
            justify-content: center; align-items: center; 
            z-index: 999; 
            padding: 10px;
        }
        .modal-content { max-width: 90%; max-height: 85%; border-radius: 8px; box-shadow: 0 0 30px rgba(239,68,68,0.2); border: 1px solid rgba(255,255,255,0.1); }
        .close-btn { position: absolute; top: 20px; right: 25px; color: #a1a1aa; font-size: 28px; cursor: pointer; transition: color 0.2s; }
        .close-btn:hover { color: #fff; }

        /* --- RESPONSIVE MEDIA QUERIES (FOR MOBILE PHONES) --- */
        @media (max-width: 768px) {
            .hud-header {
                top: 10px; left: 10px; right: 10px; height: 50px; padding: 0 10px;
            }
            .brand-zone h2 { font-size: 11px; }
            .btn-hud { padding: 8px 10px; font-size: 11px; }
            .btn-hud span { display: none; } /* Hide text on mobile to save space */
            
            .config-dropdown { width: 200px; top: 45px; }
            
            .overlay-bottom-drawer {
                left: 10px; right: 10px; height: 190px; bottom: -240px;
                padding: 10px;
            }
            .overlay-bottom-drawer.open { bottom: 0; }
            .drawer-header h3 { font-size: 11px; }
            .info-bar { display: none; } 
            
            .snap-card { min-width: 110px; max-width: 110px; }
            .snap-card img { height: 70px; }
            .snap-info { font-size: 9px; }
            
            .close-btn { top: 15px; right: 20px; font-size: 24px; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <audio id="alarmSound" src="/static/detect.mp3" preload="auto"></audio>

    <div class="video-workspace">
        <img class="feed-img" src="/video_feed" alt="RTSP AI Camera Feed Offline">
    </div>

    <div class="hud-header">
        <div class="brand-zone">
            <div class="live-dot"></div>
            <h2>KIA BODY SHOP &bull; AI MATRIX</h2>
        </div>
        
        <div class="control-cluster">
            <button class="btn-hud" id="audioInitBtn" title="Toggle Sound System">
                <i class="fa-solid fa-volume-xmark" id="audioIcon"></i>
                <span id="audioBtnText">Enable Audio Alert</span>
            </button>

            <button class="btn-hud" id="toggleDrawerBtn" title="View Captures">
                <i class="fa-solid fa-images"></i>
                <span>Intrusion Snaps</span>
            </button>

            <div class="config-wrapper">
                <button class="btn-hud" id="configMenuBtn" title="System Settings">
                    <i class="fa-solid fa-sliders"></i>
                    <span>Configurations</span>
                    <i class="fa-solid fa-chevron-down" style="font-size: 9px; margin-left: 2px; display: inline-block;"></i>
                </button>
                
                <ul class="config-dropdown" id="configDropdownMenu">
                    {% if role == 'admin' %}
                    <li><a href="/user_management"><i class="fa-solid fa-users-gear text-warning"></i> User Management</a></li>
                    {% endif %}
                    <li><a href="/roi"><i class="fa-solid fa-draw-polygon text-info"></i> Setup ROI Boundaries</a></li>
                    <li><a href="/incident_logs"><i class="fa-solid fa-receipt text-danger"></i> Incident Logs Audit</a></li>
                    <li class="menu-divider"></li>
                    <li><a href="/logout" class="logout-btn"><i class="fa-solid fa-power-off"></i> Sign Out System</a></li>
                </ul>
            </div>
        </div>
    </div>

    <div class="overlay-bottom-drawer" id="snapDrawer">
        <div class="drawer-header">
            <div style="display: flex; gap: 15px; align-items: center;">
                <h3><i class="fa-solid fa-triangle-exclamation text-danger" style="margin-right: 4px;"></i> Threat Captures</h3>
                <div class="info-bar">
                    <span>Operator: <strong>{{ username }}</strong></span>
                    <span>Alarm System: <strong id="soundState" style="color: #ef4444;">MUTED</strong></span>
                </div>
            </div>
            <button id="closeDrawerBtn" style="background:none; border:none; color:#71717a; cursor:pointer; font-size:16px; padding: 4px;"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="snapshot-horizontal-box" id="historyGrid">
            </div>
    </div>

    <div class="modal" id="imageModal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImg" alt="Enlarged Threat Capture">
    </div>

    <script>
        let soundEnabled = false;
        const alarm = document.getElementById('alarmSound');
        const audioBtn = document.getElementById('audioInitBtn');
        const audioIcon = document.getElementById('audioIcon');
        const audioBtnText = document.getElementById('audioBtnText');
        const soundStateText = document.getElementById('soundState');

        // UI Selectors 
        const configMenuBtn = document.getElementById('configMenuBtn');
        const configDropdownMenu = document.getElementById('configDropdownMenu');
        const toggleDrawerBtn = document.getElementById('toggleDrawerBtn');
        const closeDrawerBtn = document.getElementById('closeDrawerBtn');
        const snapDrawer = document.getElementById('snapDrawer');

        // Dropdown Menu Logic
        configMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            configDropdownMenu.classList.toggle('active');
        });

        // Bottom Drawer Panel Logic
        toggleDrawerBtn.addEventListener('click', () => {
            snapDrawer.classList.toggle('open');
        });
        closeDrawerBtn.addEventListener('click', () => {
            snapDrawer.classList.remove('open');
        });

        // Global Dynamic Click to Close Dropdown
        document.addEventListener('click', () => {
            configDropdownMenu.classList.remove('active');
        });

        // Audio Alert System Toggling Logic
        audioBtn.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            if (soundEnabled) {
                audioBtn.classList.add('btn-alert-active');
                audioIcon.className = "fa-solid fa-volume-high";
                if(audioBtnText) audioBtnText.innerText = "Audio Interlock Armed";
                if(soundStateText) {
                    soundStateText.innerText = "ONLINE";
                    soundStateText.style.color = "#22c55e";
                }
            } else {
                audioBtn.classList.remove('btn-alert-active');
                audioIcon.className = "fa-solid fa-volume-xmark";
                if(audioBtnText) audioBtnText.innerText = "Enable Audio Alert";
                if(soundStateText) {
                    soundStateText.innerText = "MUTED";
                    soundStateText.style.color = "#ef4444";
                }
            }
        });

        // Diagnostics API Polling Loop
        function checkDiagnostics() {
            fetch('/system_status')
                .then(res => {
                    if (!res.ok) throw new Error('Network error');
                    return res.json();
                })
                .then(data => {
                    if (data.latest_incident) {
                        const incident = data.latest_incident;
                        
                        // Execute alert audio
                        if (soundEnabled) {
                            alarm.currentTime = 0;
                            alarm.play().catch(e => console.log("Audio buffer block event:", e));
                        }

                        // Injecting card inside horizontal grid
                        const grid = document.getElementById('historyGrid');
                        const card = document.createElement('div');
                        card.className = "snap-card";
                        card.onclick = () => openModal(incident.image_url);
                        
                        card.innerHTML = `
                            <img src="${incident.image_url}" alt="Threat Snapshot">
                            <div class="snap-info">
                                <span class="snap-conf"><i class="fa-solid fa-bullseye"></i> ${incident.confidence}</span>
                                <span class="snap-time"><i class="fa-regular fa-clock"></i> ${incident.timestamp}</span>
                            </div>
                        `;
                        grid.insertBefore(card, grid.firstChild);

                        // Auto expand panel UI upon detection trigger
                        snapDrawer.classList.add('open');
                    }
                })
                .catch(err => console.error("Diagnostics Fetch Failure:", err));
        }

        // Modal Functionality
        function openModal(url) {
            const modal = document.getElementById('imageModal');
            modal.style.display = "flex";
            document.getElementById('modalImg').src = url;
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = "none";
        }

        // Run pooling loop every 1 second
        setInterval(checkDiagnostics, 1000);
    </script>
</body>
</html>
