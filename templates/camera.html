<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Camera Hardware Control</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #121212; color: #e0e0e0; }
        .card { background-color: #1e1e1e; border: 1px solid #333; color: #fff; }
        .form-control, .form-select { background-color: #2a2a2a; color: #fff; border: 1px solid #444; }
        .form-control:focus, .form-select:focus { background-color: #333; color: #fff; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card p-3 text-center">
                    <h5 class="card-title">🚀 Live Lag-Free Stream</h5>
                    <img src="{{ url_for('video_feed') }}" class="img-fluid rounded border border-secondary" alt="Live Feed" style="max-height: 400px; background: #000;">
                </div>
            </div>

            <div class="col-md-6">
                <div class="card p-4">
                    <h4 class="mb-4 text-warning">⚙️ Hardware Camera Adjustments</h4>
                    <div id="alert-box"></div>
                    
                    <form id="camForm">
                        <div class="mb-3">
                            <label class="form-label">Resolution / Stream Selection</label>
                            <select class="form-select" id="cam_resolution">
                                <option value="640x480" {% if config.get('cam_resolution') == '640x480' %}selected{% endif %}>Substream (640x480) - Best For AI/Zero Lag</option>
                                <option value="1280x720" {% if config.get('cam_resolution') == '1280x720' %}selected{% endif %}>Mainstream HD (1280x720)</option>
                                <option value="1920x1080" {% if config.get('cam_resolution') == '1920x1080' %}selected{% endif %}>Full HD (1920x1080) - Heavy</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Stream Compression Quality</label>
                            <select class="form-select" id="cam_quality">
                                <option value="SD" {% if config.get('cam_quality') == 'SD' %}selected{% endif %}>SD (Low Bandwidth - Super Fast)</option>
                                <option value="MD" {% if config.get('cam_quality') == 'MD' %}selected{% endif %}>MD (Medium Quality)</option>
                                <option value="HD" {% if config.get('cam_quality') == 'HD' %}selected{% endif %}>HD (Crystal Clear - Higher Latency)</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Camera FPS Limit</label>
                            <select class="form-select" id="cam_fps">
                                <option value="15" {% if config.get('cam_fps') == '15' %}selected{% endif %}>15 FPS (Recommended for Pi)</option>
                                <option value="30" {% if config.get('cam_fps') == '30' %}selected{% endif %}>30 FPS (Smooth - Heavy CPU)</option>
                                <option value="10" {% if config.get('cam_fps') == '10' %}selected{% endif %}>10 FPS (Eco Mode)</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Digital Zoom Level: <span id="zoomVal">1</span>x</label>
                            <input type="range" class="form-range" id="cam_zoom" min="1" max="4" step="0.5" value="{{ config.get('cam_zoom', '1') }}" oninput="document.getElementById('zoomVal').innerText=this.value">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Hardware Brightness</label>
                            <input type="range" class="form-range" id="cam_brightness" min="0" max="255" value="{{ config.get('cam_brightness', '128') }}">
                        </div>

                        <button type="button" onclick="saveCamSettings()" class="btn btn-warning w-100 fw-bold text-dark">Apply Settings Instantly</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function saveCamSettings() {
            const data = {
                cam_resolution: document.getElementById('cam_resolution').value,
                cam_quality: document.getElementById('cam_quality').value,
                cam_fps: document.getElementById('cam_fps').value,
                cam_zoom: document.getElementById('cam_zoom').value,
                cam_brightness: document.getElementById('cam_brightness').value
            };

            fetch('/commit_camera_settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(resData => {
                const alertBox = document.getElementById('alert-box');
                if(resData.status === 'success') {
                    alertBox.innerHTML = `<div class="alert alert-success">${resData.message}</div>`;
                } else {
                    alertBox.innerHTML = `<div class="alert alert-danger">Error: ${resData.message}</div>`;
                }
            });
        }
    </script>
</body>
</html>
