<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Identity Matrix Registry Registry</title>
    <style>
        :root { --bg-base: #020617; --bg-card: #0f172a; --border: #1e293b; --primary: #2563eb; --danger: #ef4444; --text: #f8fafc; --muted: #64748b; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg-base); color: var(--text); padding: 30px; display: flex; justify-content: center; }
        .panel { width: 100%; max-width: 750px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); padding: 32px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 24px; }
        h2 { margin: 0; font-size: 20px; font-weight: 800; }
        .back-nav { color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 600; }
        .layout-split { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
        .field { width: 100%; background: #020617; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; box-sizing: border-box; outline: none; }
        .btn { border: none; padding: 10px 16px; border-radius: 6px; font-weight: 700; cursor: pointer; color: white; width: 100%; }
        .btn-add { background: var(--primary); }
        .user-list { list-style: none; padding: 0; margin: 0; }
        .user-item { display: flex; justify-content: space-between; align-items: center; background: rgba(2,6,23,0.3); border: 1px solid var(--border); padding: 10px 14px; border-radius: 6px; margin-bottom: 8px; }
        .btn-del { background: var(--danger); width: auto; font-size: 12px; padding: 5px 10px; }
    </style>
</head>
<body>
<div class="panel">
    <div class="header">
        <h2>👥 Security Matrix Operator Management</h2>
        <a href="/" class="back-nav">➔ Exit Control Registry</a>
    </div>
    
    <div class="layout-split">
        <div>
            <h4 style="margin-top:0; color:var(--primary)">Register New Security Operator</h4>
            <div class="input-group">
                <label>Username Account</label>
                <input type="text" id="new_user" class="field" placeholder="Operator ID">
            </div>
            <div class="input-group">
                <label>Security Password</label>
                <input type="password" id="new_pass" class="field" placeholder="••••••••">
            </div>
            <button class="btn btn-add" onclick="provisionUser()">PROVISION ACCOUNT Identity</button>
        </div>
        
        <div>
            <h4 style="margin-top:0; color:var(--muted)">Active Security Operator Registry</h4>
            <ul class="user-list">
                {% for user in users %}
                <li class="user-item">
                    <span>👤 {{ user }}</span>
                    {% if user != 'admin' %}
                    <button class="btn btn-del" onclick="liquidateUser('{{ user }}')">Revoke Identity</button>
                    {% else %}
                    <span style="font-size:11px; color:var(--accent); font-weight:700">Root Superuser</span>
                    {% endif %}
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</div>

<script>
    function provisionUser() {
        const u = document.getElementById('new_user').value;
        const p = document.getElementById('new_pass').value;
        if(!u || !p) return alert("Fill credentials entries fields!");
        
        fetch('/manage_user_action', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({action: 'add', username: u, password: p})
        }).then(res => res.json()).then(data => { alert(data.message); location.reload(); });
    }

    function liquidateUser(targetUser) {
        if(!confirm("Revoke operator access access privileges for: " + targetUser + "?")) return;
        fetch('/manage_user_action', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({action: 'delete', username: targetUser})
        }).then(res => res.json()).then(data => { alert(data.message); location.reload(); });
    }
</script>
</body>
</html>
