<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Draw Area ROI Boundaries</title>
    <style>
        body { font-family: Arial, sans-serif; background: #111; color: #fff; text-align: center; margin: 0; padding: 15px;}
        .canvas-container { position: relative; display: inline-block; margin-top: 15px; border: 3px dashed #33b5e5; }
        canvas { position: absolute; top: 0; left: 0; cursor: crosshair; }
        .control-bar { margin: 20px; display: flex; justify-content: center; gap: 15px; }
        .btn { padding: 10px 20px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; color: white;}
        .btn-save { background: #00c851; }
        .btn-clear { background: #ff4444; }
        .btn-back { background: #33b5e5; text-decoration: none; padding: 10px 20px; font-size:14px;}
    </style>
</head>
<body>

    <h2>Setup Industrial Station Restricted Bounds Polygon</h2>
    <p>Click on the image stream sequence to create boundary intersection lines. Minimum 3 points required.</p>

    <div class="control-bar">
        <a href="/" class="btn btn-back">⬅️ Back to Main Dashboard</a>
        <button class="btn btn-clear" onclick="clearPoints()">Reset Points Grid</button>
        <button class="btn btn-save" onclick="saveROI()">Apply & Save Bounds</button>
    </div>

    <div class="canvas-container" id="container">
        <img id="streamImg" src="/video_feed" style="display: block; max-width: 900px; height: auto;" onload="initCanvas()">
        <canvas id="roiCanvas"></canvas>
    </div>

    <script>
        let points = [];
        const canvas = document.getElementById('roiCanvas');
        const ctx = canvas.getContext('2d');
        const img = document.getElementById('streamImg');

        function initCanvas() {
            canvas.width = img.clientWidth;
            canvas.height = img.clientHeight;
            loadExistingBounds();
        }

        function loadExistingBounds() {
            fetch('/get_roi')
                .then(res => res.json())
                .then(data => {
                    if(data.points) {
                        points = data.points;
                        redraw();
                    }
                });
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            // Scaling safety adjustment calculation factor
            const x = Math.round((e.clientX - rect.left) * (img.naturalWidth / img.clientWidth));
            const y = Math.round((e.clientY - rect.top) * (img.naturalHeight / img.clientHeight));
            
            points.push([x, y]);
            redraw();
        });

        function redraw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (points.length === 0) return;

            ctx.fillStyle = "rgba(0, 200, 81, 0.3)";
            ctx.strokeStyle = "#00c851";
            ctx.lineWidth = 3;

            ctx.beginPath();
            // Scale points down to canvas visual display size
            const scaleX = img.clientWidth / img.naturalWidth;
            const scaleY = img.clientHeight / img.naturalHeight;

            ctx.moveTo(points[0][0] * scaleX, points[0][1] * scaleY);
            for(let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i][0] * scaleX, points[i][1] * scaleY);
            }
            
            if(points.length > 2) ctx.closePath();
            ctx.stroke();
            ctx.fill();

            // Draw Point Circles
            points.forEach(pt => {
                ctx.beginPath();
                ctx.arc(pt[0] * scaleX, pt[1] * scaleY, 5, 0, 2 * Math.PI);
                ctx.fillStyle = "#ffbb33";
                ctx.fill();
            });
        }

        function clearPoints() {
            points = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function saveROI() {
            fetch('/save_roi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ points: points })
            })
            .then(res => res.json())
            .then(data => alert(data.message));
        }

        // Adjust layout if window sizing transitions occur
        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>
